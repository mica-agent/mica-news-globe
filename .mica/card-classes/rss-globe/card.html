<div class="card-rss-globe">
  <div class="globe-container" id="globe-container"></div>
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading globe…</div>
  </div>
  <div class="error-overlay" id="error-overlay" style="display:none;">
    <span class="error-text"></span>
  </div>
  <div class="news-overlay" id="news-overlay" style="display:none;">
    <div class="news-card">
      <div class="news-header">
        <span class="news-source" id="news-source"></span>
        <button class="news-close" id="news-close">✕</button>
      </div>
      <h2 class="news-headline" id="news-headline"></h2>
      <div class="news-meta" id="news-meta"></div>
      <p class="news-description" id="news-description"></p>
      <a class="news-link" id="news-link" href="#" target="_blank" rel="noopener">Open article →</a>
    </div>
  </div>
</div>
